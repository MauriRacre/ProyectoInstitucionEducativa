<ng-container *ngIf="open">
    <div class="fixed inset-0 z-[2000] flex items-center justify-center p-4">
        
        <!-- Backdrop -->
        <div 
        class="absolute inset-0 bg-black/40 backdrop-blur-sm"
        (click)="onBackdrop()">
        </div>

        <!-- Modal -->
        <div
        role="dialog"
        aria-modal="true"
        class="relative w-full max-w-3xl overflow-hidden rounded-2xl border border-gray-200 bg-white shadow-2xl animate-fadeIn"
        >

        <!-- Header -->
        <div class="flex items-start justify-between gap-3 border-b border-gray-100 px-6 py-5">
            <div>
            <h2 class="text-xl sm:text-2xl font-semibold text-gray-900">
                {{ mode === 'edit' ? 'Editar gasto' : 'Registrar nuevo gasto' }}
            </h2>
            <p class="text-sm text-gray-500 mt-1">
                Complete la información requerida
            </p>
            </div>

            <button
            type="button"
            aria-label="Cerrar modal"
            class="rounded-lg p-2 text-gray-400 hover:bg-gray-100 hover:text-gray-700 transition"
            (click)="onCancel()"
            [disabled]="loading"
            >
            ✕
            </button>
        </div>

        <!-- FORM -->
        <form
            [formGroup]="form"
            (ngSubmit)="onSubmit()"
            autocomplete="off"
            class="max-h-[70vh] overflow-y-auto px-6 py-5"
        >

            <div class="rounded-2xl border border-gray-200 bg-gray-50 p-5">

            <h3 class="text-base font-semibold text-black">
                Datos del gasto
            </h3>

            <div class="mt-4 grid grid-cols-1 gap-4 sm:grid-cols-2">

                <!-- Concepto -->
                <div class="sm:col-span-2">
                <label class="text-xs font-semibold text-gray-700">
                    Concepto
                </label>

                <input
                    type="text"
                    formControlName="concept"
                    placeholder="Ej: Evento realizado el 26 de febrero."
                    class="mt-1 w-full rounded-lg border px-3 py-2.5 text-sm outline-none transition"
                    [ngClass]="{
                    'border-red-400 ring-2 ring-red-200': touchedInvalid('concept'),
                    'border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20': !touchedInvalid('concept')
                    }"
                />

                <p *ngIf="form.get('concept')?.touched && form.get('concept')?.errors?.['required']"
                    class="mt-1 text-xs text-red-600">
                    Concepto requerido.
                </p>

                <p *ngIf="form.get('concept')?.touched && form.get('concept')?.errors?.['minlength']"
                    class="mt-1 text-xs text-red-600">
                    Mínimo 5 caracteres.
                </p>

                <p *ngIf="form.get('concept')?.touched && form.get('concept')?.errors?.['maxlength']"
                    class="mt-1 text-xs text-red-600">
                    Máximo 200 caracteres.
                </p>
                </div>

                <!-- Monto -->
                <div>
                <label class="text-xs font-semibold text-gray-700">
                    Monto
                </label>

                <div class="mt-1 flex items-center gap-2">
                    <span class="text-gray-500 text-sm">Bs.</span>

                    <input
                    type="number"
                    min="0.01"
                    step="0.01"
                    formControlName="monto"
                    placeholder="0.00"
                    class="w-full rounded-lg border bg-white px-3 py-2.5 text-sm outline-none transition"
                    [ngClass]="{
                        'border-red-400 ring-2 ring-red-200': touchedInvalid('monto'),
                        'border-gray-200 focus:border-sky-600 focus:ring-2 focus:ring-sky-600/20': !touchedInvalid('monto')
                    }"
                    />
                </div>

                <p *ngIf="touchedInvalid('monto')" class="mt-1 text-xs text-red-600">
                    Ingresa un monto válido mayor a 0.
                </p>
                </div>
                <!-- Metodo de pago -->
                <div>
                <label class="text-xs font-semibold text-gray-700">
                    Método de pago
                </label>

                <div class="mt-1 flex rounded-lg border border-gray-200 bg-white p-1">

                    <!-- Efectivo -->
                    <button
                    type="button"
                    class="flex rounded-md px-3 py-2 text-sm font-medium transition w-full justify-center gap-3"
                    (click)="form.get('paymentMethod')?.setValue('cash')"
                    [ngClass]="form.get('paymentMethod')?.value === 'cash'
                        ? 'bg-celeste text-white shadow'
                        : 'text-gray-700 hover:bg-gray-300'"
                    >
                    
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 512" fill="currentColor" class="w-5">
                        <path d="M160 32c-35.3 0-64 28.7-64 64l0 224c0 35.3 28.7 64 64 64l352 0c35.3 0 64-28.7 64-64l0-224c0-35.3-28.7-64-64-64L160 32zm176 96a80 80 0 1 1 0 160 80 80 0 1 1 0-160zM160 152l0-48c0-4.4 3.6-8 8-8l48 0c4.4 0 8.1 3.6 7.5 8-3.6 29-26.6 51.9-55.5 55.5-4.4 .5-8-3.1-8-7.5zm0 112c0-4.4 3.6-8.1 8-7.5 29 3.6 51.9 26.6 55.5 55.5 .5 4.4-3.1 8-7.5 8l-48 0c-4.4 0-8-3.6-8-8l0-48zM504 159.5c-29-3.6-51.9-26.6-55.5-55.5-.5-4.4 3.1-8 7.5-8l48 0c4.4 0 8 3.6 8 8l0 48c0 4.4-3.6 8.1-8 7.5zM512 264l0 48c0 4.4-3.6 8-8 8l-48 0c-4.4 0-8.1-3.6-7.5-8 3.6-29 26.6-51.9 55.5-55.5 4.4-.5 8 3.1 8 7.5zM48 152c0-13.3-10.7-24-24-24S0 138.7 0 152L0 416c0 35.3 28.7 64 64 64l392 0c13.3 0 24-10.7 24-24s-10.7-24-24-24L64 432c-8.8 0-16-7.2-16-16l0-264z"/>
                    </svg>Efectivo
                    </button>

                    <!-- QR -->
                    <button
                    type="button"
                    class="flex rounded-md px-3 py-2 text-sm font-medium transition w-full justify-center gap-3"
                    (click)="form.get('paymentMethod')?.setValue('qr')"
                    [ngClass]="form.get('paymentMethod')?.value === 'qr'
                        ? 'bg-celeste text-white shadow'
                        : 'text-gray-700 hover:bg-gray-300'"
                    >
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512" fill="currentColor" class="w-5">
                            <path d="M64 160l64 0 0-64-64 0 0 64zM0 80C0 53.5 21.5 32 48 32l96 0c26.5 0 48 21.5 48 48l0 96c0 26.5-21.5 48-48 48l-96 0c-26.5 0-48-21.5-48-48L0 80zM64 416l64 0 0-64-64 0 0 64zM0 336c0-26.5 21.5-48 48-48l96 0c26.5 0 48 21.5 48 48l0 96c0 26.5-21.5 48-48 48l-96 0c-26.5 0-48-21.5-48-48l0-96zM320 96l0 64 64 0 0-64-64 0zM304 32l96 0c26.5 0 48 21.5 48 48l0 96c0 26.5-21.5 48-48 48l-96 0c-26.5 0-48-21.5-48-48l0-96c0-26.5 21.5-48 48-48zM288 352a32 32 0 1 1 0-64 32 32 0 1 1 0 64zm0 64c17.7 0 32 14.3 32 32s-14.3 32-32 32-32-14.3-32-32 14.3-32 32-32zm96 32c0-17.7 14.3-32 32-32s32 14.3 32 32-14.3 32-32 32-32-14.3-32-32zm32-96a32 32 0 1 1 0-64 32 32 0 1 1 0 64zm-32 32a32 32 0 1 1 -64 0 32 32 0 1 1 64 0z"/>
                        </svg>QR
                    </button>

                </div>

                <p *ngIf="touchedInvalid('paymentMethod')" class="mt-1 text-xs text-red-600">
                    Selecciona un método de pago.
                </p>
                </div>
            </div>
            </div>

            <!-- Footer -->
            <div class="flex items-center justify-end gap-3 border-t border-gray-100 bg-gray-50 px-6 py-4 mt-6">
            <button
                type="button"
                class="w-28 rounded-lg bg-white px-4 py-2 text-sm font-semibold text-gray-800 border border-gray-200 hover:bg-gray-100 transition"
                (click)="onCancel()"
                [disabled]="loading"
            >
                Cancelar
            </button>

            <button
                type="submit"
                class="w-28 rounded-lg bg-celeste px-4 py-2 text-sm font-semibold text-white hover:bg-azul disabled:opacity-60 transition"
                [disabled]="loading || form.invalid"
            >
                {{ loading ? 'Guardando…' : (mode === 'edit' ? 'Guardar' : 'Registrar') }}
            </button>
            </div>

        </form>
        </div>
    </div>
</ng-container>
