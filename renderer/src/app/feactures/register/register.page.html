<div class="min-h-screen bg-gray-50 p-6">

  <!-- HEADER -->
  <div class="mb-6">
    <div class="flex items-center gap-3">
      <a href="/" class="p-2 rounded-lg hover:bg-white hover:shadow">
        <svg viewBox="0 0 640 640" class="w-6">
          <path d="M201.4 297.4C188.9 309.9 188.9 330.2 201.4 342.7L361.4 502.7C373.9 515.2 394.2 515.2 406.7 502.7C419.2 490.2 419.2 469.9 406.7 457.4L269.3 320L406.6 182.6C419.1 170.1 419.1 149.8 406.6 137.3C394.1 124.8 373.8 124.8 361.3 137.3L201.3 297.3z"/>
        </svg>
      </a>
      <div>
        <h1 class="text-2xl font-semibold text-gray-900">
          Gestión de cursos
        </h1>
        <p class="text-sm text-gray-500">
          Gestionar altas y bajas de cursos extra.
        </p>
      </div>
    </div>
  </div>

  <!-- TUTOR -->
  <div class="bg-white rounded-xl shadow-sm p-5 mb-6">
    <h2 class="text-lg font-semibold text-gray-800">{{ tutor.name }}</h2>
    <div class="mt-3 flex gap-4 text-sm text-gray-600 items-center">
      <div>{{ tutor.phone }}</div>
      <div>{{ tutor.email }}</div>
    </div>
  </div>

  <!-- CHILDREN GRID -->
  <div class="grid md:grid-cols-2 gap-6">

    <div *ngFor="let child of children"
         class="bg-white rounded-xl shadow-sm p-5">

      <!-- CHILD HEADER -->
      <div class="flex justify-between items-start mb-4">
        <div>
          <h3 class="text-base font-semibold text-gray-800">
            {{ child.name }}
          </h3>
          <p class="text-sm text-gray-500">
            {{ child.grade }} - {{ child.parallel }}
          </p>
        </div>

        <button
          (click)="addCourse(child.id)"
          class="bg-celeste hover:bg-azul text-white font-semibold text-sm px-4 py-2 rounded-md transition">
          + Agregar
        </button>
      </div>

      <!-- COURSES -->
      <div *ngIf="child.courses.length > 0; else noCourses"
           class="space-y-2">

        <div *ngFor="let c of child.courses"
             class="flex justify-between items-center bg-gray-50 rounded-md px-3 py-2">

          <div>
            <div class="text-sm font-medium text-gray-700">
              {{ c.concept }}
            </div>
            <div class="text-xs text-gray-500">
              Pendiente: Bs. {{ c.pending | number:'1.2-2' }}
            </div>
          </div>

          <button
            (click)="deleteCourse(c.id)"
            class="text-red-600 hover:text-red-800 text-sm font-medium">
            Desinscribir
          </button>

        </div>

      </div>

      <ng-template #noCourses>
        <p class="text-sm text-gray-400 italic">
          No tiene cursos asignados.
        </p>
      </ng-template>

    </div>

  </div>
</div>
