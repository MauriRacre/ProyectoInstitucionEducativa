<div class="min-h-screen bg-gray-50 p-6">
    <!-- HEADER -->
    <div class="mb-6">
        <div class="flex items-center gap-3">
        <a href="/" class="p-2 rounded-lg hover:bg-white hover:shadow">
            <svg viewBox="0 0 640 640" class="w-6">
                <path d="M201.4 297.4C188.9 309.9 188.9 330.2 201.4 342.7L361.4 502.7C373.9 515.2 394.2 515.2 406.7 502.7C419.2 490.2 419.2 469.9 406.7 457.4L269.3 320L406.6 182.6C419.1 170.1 419.1 149.8 406.6 137.3C394.1 124.8 373.8 124.8 361.3 137.3L201.3 297.3z"/>
            </svg>
        </a>
        <div>
            <h1 class="text-2xl font-semibold text-gray-900 text-center">
            Gestión de cursos
            </h1>
            <p class="text-sm text-gray-500">
            Gestionar altas y bajas de cursos extra.
            </p>
        </div>
        </div>
    </div>

    <!-- TUTOR -->
    <div class="bg-white rounded-xl shadow-sm p-5 mb-6">
        <h2 class="text-lg font-semibold text-gray-800">{{ tutor.name }}</h2>
        <div class="mt-3 flex gap-4 text-sm text-gray-600 items-center">
            <div class="flex gap-1">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" fill="currentColor" class="w-3 mr-1">
                    <path d="M144 128C144 92.7 172.7 64 208 64L432 64C467.3 64 496 92.7 496 128L496 512C496 547.3 467.3 576 432 576L208 576C172.7 576 144 547.3 144 512L144 128zM208 128L208 432L432 432L432 128L208 128zM320 536C337.7 536 352 521.7 352 504C352 486.3 337.7 472 320 472C302.3 472 288 486.3 288 504C288 521.7 302.3 536 320 536z"/>
                </svg>
                {{ tutor.phone }}
            </div>
            <div class="flex gap-1">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" fill="currentColor" class="w-3 mr-1 mt-1">
                    <path d="M125.4 128C91.5 128 64 155.5 64 189.4C64 190.3 64 191.1 64.1 192L64 192L64 448C64 483.3 92.7 512 128 512L512 512C547.3 512 576 483.3 576 448L576 192L575.9 192C575.9 191.1 576 190.3 576 189.4C576 155.5 548.5 128 514.6 128L125.4 128zM528 256.3L528 448C528 456.8 520.8 464 512 464L128 464C119.2 464 112 456.8 112 448L112 256.3L266.8 373.7C298.2 397.6 341.7 397.6 373.2 373.7L528 256.3zM112 189.4C112 182 118 176 125.4 176L514.6 176C522 176 528 182 528 189.4C528 193.6 526 197.6 522.7 200.1L344.2 335.5C329.9 346.3 310.1 346.3 295.8 335.5L117.3 200.1C114 197.6 112 193.6 112 189.4z"/>
                </svg>
                {{ tutor.email }}
            </div>
        </div>
    </div>

    <div class="grid md:grid-cols-2 gap-6">
        <div *ngFor="let child of children" class="bg-white rounded-xl shadow-sm p-5">
        <div class="flex justify-between items-start mb-4">
            <div>
            <h3 class="text-base font-semibold text-gray-800">
                {{ child.name }}
            </h3>
            <p class="text-sm text-gray-500">
                {{ child.grade }} - {{ child.parallel }}
            </p>
            </div>
            <button
            (click)="openEnrollModal(child.id)"
            class="bg-celeste hover:bg-celeste text-white font-semibold text-sm px-4 py-2 rounded-md transition">
            + Agregar
            </button>
        </div>
        <!-- LISTA DE CURSOS -->
        <div *ngIf="child.courses.length > 0; else noCourses" class="space-y-2">

            <div *ngFor="let c of child.courses"
                class="flex justify-between items-center bg-gray-50 rounded-md px-3 py-2">
            <span class="text-sm text-gray-700">{{ c.nombre }}</span>
            <button
                (click)="deleteCourse(child.id, c.inscripcionId)"
                class="text-red-600 hover:text-red-800 text-sm">
                Eliminar
            </button>
            </div>
        </div>

        <ng-template #noCourses>
            <p class="text-sm text-gray-400 italic">
            No tiene cursos asignados.
            </p>
        </ng-template>
        </div>

    </div>
</div>
<ng-container *ngIf="showModal">
    <div class="fixed inset-0 bg-black/40 flex items-center justify-center z-50">
        <div class="bg-white p-6 rounded-xl w-96">

            <h3 class="text-lg font-semibold mb-4">
                Inscribir a curso extra
            </h3>

            <div class="space-y-3">

            <select [(ngModel)]="selectedServicioId"
                    class="w-full border rounded-lg p-2">
                <option [ngValue]="null">Seleccionar curso</option>
                <option *ngFor="let c of availableCourses"
                        [ngValue]="c.id">
                {{ c.nombre }}
                </option>
            </select>

            <input type="number"
                    [(ngModel)]="baseAmount"
                    placeholder="Monto base"
                    min="0"
                    class="w-full border rounded-lg p-2" />

            <input type="number"
                    [(ngModel)]="discountAmount"
                    placeholder="Descuento"
                    min="0"
                    class="w-full border rounded-lg p-2" />

            <p *ngIf="modalError"
                class="text-red-600 text-sm">
                {{ modalError }}
            </p>

            </div>

            <div class="flex justify-end gap-2 mt-4">
                <button (click)="closeModal()"
                class="px-4 py-2 bg-gray-200 rounded-lg">
                Cancelar
                </button>

                <button (click)="enrollStudent()"
                class="px-4 py-2 bg-celeste text-white rounded-lg">
                Inscribir
                </button>
            </div>

        </div>
    </div>
</ng-container>
